{% extends "base.html" %}
{% block content %}
<h2>Login Admin</h2>
{% if error %}<p style="color:red">{{ error }}</p>{% endif %}
<form method="post">
    <label>Username:</label><br>
    <input type="text" name="username"><br>
    <label>Password:</label><br>
    <input type="password" name="password"><br><br>
    <button type="submit">Login</button>
</form>
{% endblock %}
