name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/clean-city:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/clean-city:latest
            docker stop clean-city || true
            docker rm clean-city || true
            docker run -d --name clean-city -p 80:5000 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e S3_BUCKET="${{ secrets.S3_BUCKET }}" \
              -e AWS_REGION="${{ secrets.AWS_REGION }}" \
              -e ADMIN_USER="${{ secrets.ADMIN_USER }}" \
              -e ADMIN_PASS="${{ secrets.ADMIN_PASS }}" \
              -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              ${{ secrets.DOCKER_HUB_USERNAME }}/clean-city:latest